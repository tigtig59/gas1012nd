<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAS API CRUD & Drive Storage</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
  <div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold mb-4 text-blue-600">
      Manage Data & Google Drive Photos
    </h2>
    <div class="space-y-3 mb-6 p-4 border rounded bg-blue-50">
      <input id="selected_id" type="hidden" />
      <input id="name" type="text" placeholder="Name" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none" />
      <input id="detail" type="text" placeholder="Detail" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none" />
      <div>
        <label class="block text-sm font-medium text-gray-700">Upload Image:</label>
        <input id="imageFile" type="file" accept="image/*" class="w-full p-1 text-sm border rounded bg-white mt-1" />
        <p id="fileName" class="text-xs text-gray-500 mt-1 italic"></p>
      </div>
      <div class="flex gap-2 pt-2">
        <button id="btnAdd" onclick="createData()" class="flex-1 bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 transition">Add New</button>
        <button id="btnUpdate" onclick="updateData()" class="flex-1 bg-yellow-500 text-white py-2 rounded font-bold hidden transition">Save Changes</button>
        <button onclick="clearForm()" class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500 transition">Clear</button>
      </div>
    </div>
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-bold text-gray-700 text-lg">Data List</h3>
      <button onclick="readData()" class="text-blue-600 hover:underline text-sm font-medium">Refresh List</button>
    </div>
    <div id="statusMsg" class="hidden text-center text-sm py-2 px-4 rounded mb-3"></div>
    <div id="dataList" class="space-y-3">
      <p class="text-center text-gray-400 italic">Loading data...</p>
    </div>
  </div>
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxvWunpkF-9wkymzffTCPb2VaEVbjSGpaAnNnpZgxxwhMlfgLNSnE-QaQm0XuHPWWXG/exec";
    let base64Image = "";
    const $ = id => document.getElementById(id);
    $("imageFile").addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      $("fileName").innerText = `Selected: ${file.name}`;
      const reader = new FileReader();
      reader.onload = () => (base64Image = reader.result);
      reader.readAsDataURL(file);
    });
    function showStatus(msg, isSuccess) {
      const el = $("statusMsg");
      el.textContent = msg;
      el.className = `text-center text-sm py-2 px-4 rounded mb-3 ${isSuccess ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700"}`;
      el.classList.remove("hidden");
      setTimeout(() => el.classList.add("hidden"), 4000);
    }
    async function readData() {
      try {
        const res = await fetch(`${API_URL}?action=read&t=${Date.now()}`);
        const data = await res.json();
        const list = $("dataList");
        list.innerHTML = data.length === 0 ? '<p class="text-center text-gray-400">No data found.</p>' : "";
        data.forEach(item => {
          const card = document.createElement("div");
          card.className = "flex items-center gap-4 p-3 border rounded bg-white hover:shadow-md transition";
          const imgSrc = item.Image ? item.Image.replace("uc?id=", "thumbnail?id=").replace("&export=download", "&sz=w400") : "https://placehold.co/60x60?text=No+Img";
          card.innerHTML = `<img src="${imgSrc}" referrerpolicy="no-referrer" class="w-16 h-16 object-cover rounded shadow-sm border bg-gray-100" onerror="this.src='https://placehold.co/60x60?text=No+Img'"><div class="flex-1 min-w-0"><div class="font-bold text-gray-800">${item.Name}</div><div class="text-sm text-gray-500 truncate">${item.Detail}</div><div class="text-[10px] text-gray-300 mt-1 uppercase font-mono truncate">${item.ID}</div></div><div class="flex flex-col gap-1 shrink-0"><button onclick='editMode(${JSON.stringify(item)})' class="text-xs bg-yellow-100 text-yellow-700 px-3 py-1.5 rounded hover:bg-yellow-200">Edit</button><button onclick="deleteData('${item.ID}')" class="text-xs bg-red-100 text-red-700 px-3 py-1.5 rounded hover:bg-red-200">Del</button></div>`;
          list.appendChild(card);
        });
      } catch { $("dataList").innerHTML = '<p class="text-center text-red-500">Failed to load data.</p>'; }
    }
    function editMode(item) {
      $("selected_id").value = item.ID; $("name").value = item.Name; $("detail").value = item.Detail; base64Image = item.Image;
      $("btnUpdate").classList.remove("hidden"); $("btnAdd").classList.add("hidden");
      $("fileName").innerText = "Current image kept unless new file chosen";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    async function createData() {
      if (!validateForm()) return;
      await sendRequest({ action: "create", name: $("name").value, detail: $("detail").value, image: base64Image });
    }
    async function updateData() {
      if (!validateForm()) return;
      await sendRequest({ action: "update", id: $("selected_id").value, name: $("name").value, detail: $("detail").value, image: base64Image });
    }
    async function deleteData(id) { if (!confirm("Are you sure you want to delete this item?")) return; await sendRequest({ action: "delete", id }); }
    async function sendRequest(payload) {
      showStatus("⏳ กำลังดำเนินการ...", true); setFormDisabled(true);
      try {
        const res = await fetch(API_URL, { method: "POST", redirect: "follow", body: JSON.stringify(payload) });
        const result = await res.json();
        showStatus(`${result.success ? "✅" : "❌"} ${result.message}`, result.success);
        if (result.success) { clearForm(); setTimeout(readData, 3000); }
      } catch { showStatus("✅ ส่งข้อมูลแล้ว กำลัง Refresh...", true); clearForm(); setTimeout(readData, 3000); }
      finally { setFormDisabled(false); }
    }
    function setFormDisabled(disabled) { ["btnAdd", "btnUpdate"].forEach(id => { const el = $(id); if (el) el.disabled = disabled; }); }
    function validateForm() { if (!$("name").value || !$("detail").value) { alert("Please fill in Name and Detail."); return false; } return true; }
    function clearForm() {
      $("selected_id").value = ""; $("name").value = ""; $("detail").value = ""; $("imageFile").value = ""; $("fileName").innerText = "";
      $("btnUpdate").classList.add("hidden"); $("btnAdd").classList.remove("hidden"); base64Image = "";
    }
    readData();
  </script>
</body>
</html>
